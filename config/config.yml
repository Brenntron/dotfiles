development:
  amq:
    host: "localhost"
  bugzilla:
#    host: "bugzillaTest02.vrt.sourcefire.com"
    host: "bugzilla-staging.vrt.sourcefire.com"
  cert:
    vrt: "extras/ssh/ca.pem"
  peakebridge:
    addressees:
      peakebridge:
        host: "localhost"
        port: 2996
        ssl: false
        uri_base: "/peakebridge/channels"
  perl:
    cmd: "/usr/bin/env perl"
    canvas_root: "extras"
    extras_dir: 'extras'
    visruleparser_path: "extras/visruleparser_dev.pl"
    snort_json_path: 'extras/snort_json_parser.pl'
    cve2x_path: "extras/cve2x_dev.pl"
    rule2yaml_path: "extras/rule2yaml_dev.pl"
  ruletest:
    url: "https://localhost:3000/api_test"
  svn:
    cmd: "/usr/bin/env svn"
    password: ""
    rules_repo_url: "https://repo-test.vrt.sourcefire.com/svn/rules/trunk"
    ruledocs_repo_url: "https://repo-test.vrt.sourcefire.com/svn/rules/trunk/docs/rulesdocs/"
    snort_rule_path: "extras/snort/snort-rules"

test:
  amq:
    host: "localhost"
  bugzilla:
#    host: "bugzillaTest02.vrt.sourcefire.com"
    host: "bugzilla-staging.vrt.sourcefire.com"
  cert:
    vrt: "/System/Library/OpenSSL/certs/ca.pem"
  perl:
    cmd: "/usr/bin/env perl"
    canvas_root: "extras"
    extras_dir: 'extras'
    visruleparser_path: "extras/visruleparser_dev.pl"
    snort_json_path: 'extras/snort_json_parser.pl'
    cve2x_path: "extras/cve2x_dev.pl"
    rule2yaml_path: "extras/rule2yaml_dev.pl"
  ruletest:
    url: "https://localhost:3000/api_test"
  svn:
    cmd: "/usr/bin/env svn"
    password: ""
    rules_repo_url: "https://repo-test.vrt.sourcefire.com/svn/rules/trunk"
    ruledocs_repo_url: "https://repo-test.vrt.sourcefire.com/svn/rules/trunk/docs/rulesdocs/"
    snort_rule_path: "extras/snort/snort-rules"

staging:
  amq:
    host: "fmd-actmq-01stg.vrt.sourcefire.com"
  bugzilla:
    host: "bugzilla-staging.vrt.sourcefire.com"
  cert:
    vrt: "/usr/local/etc/trusted-certificates.pem"
  perl:
    cmd: "/usr/local/bin/perl"
    canvas_root: "extras"
    extras_dir: 'extras'
    visruleparser_path: "extras/visruleparser.pl"
    snort_json_path: 'extras/snort_json_parser.pl'
    cve2x_path: "extras/cve2x.pl"
    rule2yaml_path: "extras/rule2yaml.pl"
  ruletest:
    url: "https://fmd-rultst-01stg.vrt.sourcefire.com"
  svn:
    cmd: "/usr/local/bin/svn"
    password: ""
    rules_repo_url: "https://repo-staging.vrt.sourcefire.com/svn/rules/trunk"
    ruledocs_repo_url: "https://repo-staging.vrt.sourcefire.com/svn/rules/trunk/docs/ruledocs/"
    snort_rule_path: "extras/snort/snort-rules"

