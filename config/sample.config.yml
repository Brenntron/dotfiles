development:
  amq: #active message queue
    host: "localhost"
  auto_resolve:
    complaints:
      check: true
    virus_total:
      check: true
    umbrella:
      check: true
      url: "https://investigate.api.umbrella.com/domains/categorization/"
      api_key: "redacted"
  bugzilla:
    #host: "bugzillaTest02.vrt.sourcefire.com"
    host: "bugzilla-staging.vrt.sourcefire.com"
  cert:
    #vrt: "/System/Library/OpenSSL/certs/ca.pem" #Mac OS X standard location for certs
    vrt: "extras/ssh/ca.pem"
  peakebridge:
    host: "localhost"
    port: 2966
    # ssl_mod { "no-tls" for http, "verify-none" for self signed cert, "verify-peer" for CA }
    ssl_mode: "verify-peer"
    ca_file: "/usr/local/etc/trusted-certificates.pem"
    uri_base: "/peakebridge/channels"
    sources:
      "snort-org":
        aws_access_key_id: "redacted"
        aws_secret_access_key: "redacted"
        aws_s3_host_name: "US East (N. Virginia)"
        aws_region: "us-east-1"
        aws_bucket: "snort-org-site"
  perl:
    cmd: "/usr/bin/env perl"
    canvas_root: "extras"
    extras_dir: 'extras'
    visruleparser_path: "extras/visruleparser_dev.pl"
    snort_json_path: 'extras/snort_json_parser.pl'
    cve2x_path: "extras/cve2x_dev.pl"
    rule2yaml_path: "extras/rule2yaml_dev.pl"
  rep_api:
    #host: "localhost"
    #port: 2944                          #default port for wbrs_stub
    #verify_mode: "no-tls"
    #gssnegotiate: true
    host: "fmdreputation.vrt.sourcefire.com"
    port: 443
    # verify_mode { "no-tls" for http, "verify-none" for self signed cert, "verify-peer" for CA }
    verify_mode: "verify-none"
    gssnegotiate: true
  ruletest:
    url: "https://localhost:3000/api_test"
  snort_doc_max_fails: 3
  snort_org:
    host: "localhost"
    port: 3000
    api_key: "redacted"
  svn:
    cmd: "/usr/bin/env svn"
    password: ""
    rules_repo_url: "https://repo-test.vrt.sourcefire.com/svn/rules/trunk"
    ruledocs_repo_url: "https://repo-test.vrt.sourcefire.com/svn/rules/trunk/docs/rulesdocs/"
    snort_rule_path: "extras/snort/snort-rules"
  virustotal:
    url: "https://www.virustotal.com/vtapi/v2/url/report"
    host: "www.virustotal.com"
    port: 443
    api_key: "redacted"
  wbrs:
    #host: "localhost"
    #port: 2944                          #default wbrs_stub port
    #verify_mode: "no-tls"
    #gssnegotiate: false
    host: "stage-wbrsruleapi-vip.vega.ironport.com"
    port: 80
    # verify_mode { "no-tls" for http, "verify-none" for self signed cert, "verify-peer" for CA }
    verify_mode: "no-tls"
    gssnegotiate: false
  bls:
    host: "stage-bls-vip.sv4.ironport.com"
    port: 443
  xbrs:
    #host: "localhost"
    #port: 1188                          #default xbrs_stub port
    #verify_mode: "no-tls"
    #gssnegotiate: false
    host: "prod-xbrs.vega.ironport.com"
    port: 80
    # verify_mode { "no-tls" for http, "verify-none" for self signed cert, "verify-peer" for CA }
    verify_mode: "no-tls"
    gssnegotiate: false

