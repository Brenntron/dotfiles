# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
palette:
  blue: "#8aadf4"
  green: "#a6da95"
  flamingo: "#f0c6c6"
  lavender: "#b7bdf8"
  mauve: "#c6a0f6"
  maroon: "#ee99a0"
  pink: "#f5bde6"
  red: "#ed8796"
  sapphire: "#7dc4e4"
  sky: "#91d7e3"
  teal: "#8bd5ca"
  yellow: "#eed49f"
  text: "#1e2030"
blocks:
  - type: prompt
    alignment: left
    segments:
      - options:
          debian: "´î¬ "
          display_distro_name: true
        template: " {{.Icon}} "
        foreground: p:text
        background: p:blue
        type: os
        style: powerline
        powerline_symbol: ""
      - template: "{{ .HostName }} "
        foreground: p:text
        background: p:blue
        powerline_symbol: ¯é┤
        type: session
        style: powerline
      - options:
          http_timeout: 1000
        cache:
          duration: 5m0s
          strategy: folder
        template: " \U000F0A60 {{ .IP }} "
        background: p:sky
        foreground: p:text
        powerline_symbol: ¯é┤
        type: ipify
        style: powerline
      - options:
          folder_icon: "¯ù¥ "
          home_icon: "~"
          style: agnoster_full
        template: " {{ .Path }}"
        foreground: p:text
        background: p:pink
        powerline_symbol: ¯é┤
        type: path
        style: powerline
        leading_powerline_symbol: ""
      - options:
          branch_icon: " ¯£Ñ  "
          cherry_pick_icon: " ¯èø  "
          commit_icon: " ´Éù  "
          fetch_status: false
          fetch_upstream_icon: false
          merge_icon: " ¯£º  "
          no_commits_icon: " \U000F071B  "
          rebase_icon: " ¯£¿  "
          revert_icon: " ´âó  "
          tag_icon: " ´ÉÆ  "
        template: "{{ .HEAD }}"
        foreground: p:text
        background: p:lavender
        powerline_symbol: ¯é┤
        type: git
        style: powerline
      - options:
          cache_duration: none
        template: " ¯ÿ¡  {{ .Full }} "
        powerline_symbol: ¯é┤
        foreground: p:text
        background: p:mauve
        type: elixir
        style: powerline
      - options:
          cache_duration: none
        template: " ¯ÿº  {{ .Full }} "
        foreground: p:text
        background: p:sapphire
        powerline_symbol: ¯é┤
        type: go
        style: powerline
      - options:
          cache_duration: none
        template: " \U000F08B1  {{ .Full }} "
        foreground: p:text
        background: p:blue
        powerline_symbol: ¯é┤
        type: lua
        style: powerline
      - options:
          cache_duration: none
        template: " ¯£ÿ  {{ .Full }} "
        foreground: p:text
        background: p:green
        powerline_symbol: ¯é┤
        type: node
        style: powerline
      - options:
          cache_duration: none
        template: " ¯êÁ {{ if .Venv }} {{ .Venv }}{{end}} {{ .Full }} "
        foreground: p:text
        background: p:yellow
        powerline_symbol: ¯é┤
        type: python
        style: powerline
      - options:
          cache_duration: none
        template: " ¯×æ  {{ .Full }} "
        foreground: p:text
        background: p:red
        powerline_symbol: ¯é┤
        type: ruby
        style: powerline
      - options:
          cache_duration: none
        template: " ¯ƒå  {{ .Full }} "
        foreground: p:text
        background: p:mauve
        powerline_symbol: ¯é┤
        type: dotnet
        style: powerline
      - options:
          cache_duration: none
        template: " \U000F1617  {{ .Full }} "
        foreground: p:text
        background: p:red
        powerline_symbol: ¯é┤
        type: rust
        style: powerline
      - type: spotify
        style: powerline
