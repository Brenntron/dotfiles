        background: p:green
        powerline_symbol: ¯é┤
        options:
          playing_icon: "´àä  "
          paused_icon: "´èï  "
          stopped_icon: "´èì  "
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: status
        style: diamond
        foreground: p:text
        background: p:teal
        background_templates:
          - "{{ if .Error }}p:maroon{{ end }}"
        trailing_diamond: ¯é┤
        template: " ¯ê║  {{ .String }}"
        options:
          always_enabled: true
version: 4
final_space: true
