# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
palette:
  blue: "#8aadf4"
  flamingo: "#f0c6c6"
  green: "#a6da95"
  lavender: "#b7bdf8"
  maroon: "#ee99a0"
  mauve: "#c6a0f6"
  pink: "#f5bde6"
  red: "#ed8796"
  rosewater: "#f4dbd6"
  sapphire: "#7dc4e4"
  sky: "#91d7e3"
  teal: "#8bd5ca"
  text: "#1e2030"
  yellow: "#eed49f"
blocks:
  - type: prompt
    alignment: left
    segments:
      - options:
          debian: " "
          display_distro_name: true
        template: " {{.Icon}} "
        foreground: p:flamingo
        type: os
        style: plain
      - template: "{{ .UserName }} "
        foreground: p:blue
        type: session
        style: plain
      - options:
          http_timeout: 1000
        cache:
          duration: 5m0s
          strategy: folder
        template: " \U000F0A60 {{ .IP }} "
        foreground: p:sky
        type: ipify
        style: plain
      - options:
          folder_icon: " "
          home_icon: "~"
          style: agnoster_short
        template: " {{ .Path }}"
        foreground: p:pink
        type: path
        style: plain
      - type: git
        foreground: p:lavender
        options:
          branch_icon: "   "
          cherry_pick_icon: "   "
          commit_icon: "   "
          fetch_status: false
          fetch_upstream_icon: false
          merge_icon: "   "
          no_commits_icon: " \U000F071B  "
          rebase_icon: "   "
          revert_icon: "   "
          tag_icon: "   "
        style: plain
        template: "{{ .HEAD }}"
      - type: elixir
        foreground: p:mauve
        options:
          cache_duration: none
        style: plain
        template: "   {{ .Full }} "
      - type: go
        foreground: p:sapphire
        options:
          cache_duration: none
        template: "   {{ .Full }} "
        style: plain
      - type: lua
        foreground: p:blue
        options:
          cache_duration: none
        style: plain
        template: " \U000F08B1  {{ .Full }} "
      - type: node
        options:
          cache_duration: none
        template: "   {{ .Full }} "
        foreground: p:green
        style: plain
      - type: python
        foreground: p:yellow
        options:
          cache_duration: none
        style: plain
        template: "  {{ if .Venv }} {{ .Venv }}{{end}} {{ .Full }} "
      - type: ruby
        foreground: p:red
        options:
          cache_duration: none
        style: plain
        template: "   {{ .Full }} "
      - type: dotnet
        foreground: p:mauve
        options:
          cache_duration: none
        style: plain
        template: "   {{ .Full }} "
      - type: rust
        foreground: p:red
        options:
          cache_duration: none
        style: plain
        template: " \U000F1617  {{ .Full }} "
      - type: spotify
        style: plain
        foreground: p:green
        options:
          playing_icon: "  "
          paused_icon: "  "
          stopped_icon: "  "
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: status
        style: plain
        foreground: p:teal
        foreground_templates:
          - "{{ if .Error }}p:maroon{{ end }}"
        template: "   {{ .String }}"
        options:
          always_enabled: true
      - type: time
        foreground: p:rosewater
        style: plain
        template: " {{ .CurrentDate | date .Format }}"
version: 4
final_space: true
