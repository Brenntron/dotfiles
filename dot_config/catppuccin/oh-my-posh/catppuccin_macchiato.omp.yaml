# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
palette:
  blue: "#8aadf4"
  green: "#a6da95"
  flamingo: "#f0c6c6"
  lavender: "#b7bdf8"
  mauve: "#c6a0f6"
  maroon: "#ee99a0"
  pink: "#f5bde6"
  red: "#ed8796"
  sapphire: "#7dc4e4"
  sky: "#91d7e3"
  teal: "#8bd5ca"
  yellow: "#eed49f"
  text: "#1e2030"
blocks:
  - type: prompt
    alignment: left
    segments:
      - options:
          debian: " "
          display_distro_name: true
        template: " {{.Icon}} "
        foreground: p:blue
        type: os
        style: plain
      - template: "{{ .UserName }} "
        foreground: p:blue
        type: session
        style: plain
      - options:
          http_timeout: 1000
        cache:
          duration: 5m0s
          strategy: folder
        template: " \U000F0A60 {{ .IP }} "
        foreground: p:sky
        type: ipify
        style: plain
      - options:
          folder_icon: " "
          home_icon: "~"
          style: agnoster_short
        template: " {{ .Path }}"
        foreground: p:pink
        type: path
        style: plain
      - options:
          branch_icon: "   "
          cherry_pick_icon: "   "
          commit_icon: "   "
          fetch_status: false
          fetch_upstream_icon: false
          merge_icon: "   "
          no_commits_icon: " \U000F071B  "
          rebase_icon: "   "
          revert_icon: "   "
          tag_icon: "   "
        template: "{{ .HEAD }}"
        foreground: p:lavender
        type: git
        style: plain
      - options:
          cache_duration: none
        template: "   {{ .Full }} "
        foreground: p:mauve
        type: elixir
        style: plain
      - options:
          cache_duration: none
        template: "   {{ .Full }} "
        foreground: p:sapphire
        type: go
        style: plain
      - options:
          cache_duration: none
        template: " \U000F08B1  {{ .Full }} "
        foreground: p:blue
        type: lua
        style: plain
      - options:
          cache_duration: none
        template: "   {{ .Full }} "
        foreground: p:green
        type: node
        style: plain
      - options:
          cache_duration: none
        template: "  {{ if .Venv }} {{ .Venv }}{{end}} {{ .Full }} "
        foreground: p:yellow
        type: python
        style: plain
      - options:
          cache_duration: none
        template: "   {{ .Full }} "
        foreground: p:red
        type: ruby
        style: plain
      - options:
          cache_duration: none
        template: "   {{ .Full }} "
        foreground: p:mauve
        type: dotnet
        style: plain
      - options:
          cache_duration: none
        template: " \U000F1617  {{ .Full }} "
        foreground: p:red
        type: rust
        style: plain
      - type: spotify
        style: plain
        foreground: p:green
        options:
          playing_icon: "  "
          paused_icon: "  "
          stopped_icon: "  "
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: status
        style: plain
        foreground: p:teal
        foreground_templates:
          - "{{ if .Error }}p:maroon{{ end }}"
        template: "   {{ .String }}"
        options:
          always_enabled: true
      - type: time
        style: plain
        template: " {{ .CurrentDate | date .Format }}"
version: 4
final_space: true
