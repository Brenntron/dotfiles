/*
 * GUID generation
 */

syntax = "proto3";

package Talos.GUID;

option go_package = "cisco.com/grpc/talos/guid";
option java_package = "talos.guid";

// Many of the Talos Cloud Services require GUIDs (Global Unique IDs) to enable
// correlation of events by various Talos backend systems. There are two
// different GUIDs involved, connection and message GUIDs. The same Connection
// GUID will be used for all messages which constitute a connection to an
// appliance, whereas each message received via that connection will need a
// separate Message GUID. Connection or Message GUIDs can be obtained either via
// the "GenGUID" method from the GUID service provided by Beaker or it may be
// generated by the platform itself by using whatever library functions are
// available to create UUIDs. Most of the Talos Cloud service requests expect
// the connection and/or message GUID to be used when interacting for the same
// message. Specific details of which requests need which GUIDs are covered by
// the Talos protobuf spec. Beaker provides GUIDs that adhere to the UUIDv4
// specification. For platforms generating the GUIDs themselves we recommend
// leveraging the same specification (rfc4122).
// Structure of a Beaker GUID request.
message Request {

    // Enumeration for the type of GUID being requested.
    enum GUIDType {
        UNSPECIFIED = 0;   // Unknown or of a type not defined here
        CONNECTION_ID = 1; // Used to identify a TCP connection
        MESSAGE_ID = 2;     // Message-level GUID, e.g., email message on ESA
        TRANSACTION_ID = 3; // Transaction-level GUID, e.g., HTTP request
    }

    // The type of GUID being requested.
    GUIDType type_of_guid = 1;
}

// Structure of a Beaker GUID service reply.
message Reply {

    // The GUID. This is in binary form. That is, there is no ascii armoring
    // (unecessary for protobuffers), and it is not valid UTF-8. The binary form
    // is what is expected by any request to Beaker containing this GUID.
    bytes guid_bin = 1;
}
