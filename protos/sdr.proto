/*
 * Sender Domain Reputation
 */

syntax = "proto3";

import "talos.proto";

package Talos.SDR;

option go_package = "cisco.com/grpc/talos/sdr";
option java_package = "talos.sdr";

/*
 * Sender Domain Reputation
 *
 * Message definitions for SDR service calls. See `Talos.Service.SDR` for
 * understanding the service workflow.
 *
 */

// Structure for a reputation request made at SMTP envelope time.
message EnvelopeRequest {
    // Information about the querying appliance and/or application.
    Talos.AppInfo app_info = 1;

    // Mail sender IP address and corresponding rdns/PTR.
    // In SDR, only the IP address and Hostname is expected.
    Talos.IPEndpoint endpoint = 2;

    // SMTP envelope details.
    Talos.SMTPEnvelope smtp_envelope = 3;

    // Connection details. Be sure to set the connection level GUID in
    // the Talos.IPConnection message. This field is specifically used to get
    // the connection guid.
    Talos.IPConnection connection = 4;

    // Message identifier. This MUST be a 128-bit value. It WILL be rejected if not.
    //
    // Do NOT reuse values. This causes serious issues related to tracking,
    // and can result in your requests being banned. You don't want this happening
    // to customer boxes. You have been warned.
    //
    // Requirement: generate a version 4 (random) UUID.
    // Most programming languages have this as part of the standard library,
    // or a de facto library that can easily be imported.
    bytes msg_guid = 5;
}

// Structure for a reply to an SDR envelope request.
message EnvelopeReply {
    // GUID representing the message. This is how you can track replies.
    bytes msg_guid = 1;

    // ID representing the threat level for this response. The Threat Level
    // map provides the mapping of the threat level ID to mnemonic and
    // description. For how and when to pull the Threat Level Map, see the
    // `QueryThreatLevelMap` service method in `service-sdr.proto`. For the
    // structure of the Threat Level Map, see the `ThreatLevelMap` message in
    // `talos.proto`.
    uint32 threat_level_id = 2;

    // Unix timestamp (Epoch) in milliseconds indicating the time at which SDR
    // received the request.
    uint64 query_ts = 3;

    // IDs representing the threat categories for this response. The Threat
    // Category Map provides the mapping of the threat category ID to
    // mnemonic, name, and description. For how and when to pull the Threat
    // Category Map, see the `QueryThreatCatMap` service method in
    // `service-sdr.proto`. For the structure of the Threat Category Map, see
    // the `ThreatCategoryMap` message in `talos.proto`. There is no limit set
    // on the number of threat category IDs returned.
    repeated uint32 threat_cat_id = 4;

    // Threat Category Map version. This provides context for the threat
    // category IDs (`threat_cat_id`) in this response. If this version is
    // higher than the version of the Threat Category Map you have cached, you
    // must update your copy. For how and when to pull the Threat Category
    // Map, see the `QueryThreatCatMap` service method in `service-sdr.proto`.
    // For the structure of the Threat Category Map, see the
    // `ThreatCategoryMap` message in `talos.proto`.
    uint32 threat_cat_map_version = 5;

    // Threat level map version. This provides context for the threat level
    // IDs (threat_level_id) in this response. If this version is higher than
    // the version of the Threat Level Map you have cached, you must update
    // your copy. For how and when to pull the Threat Level Map see the
    // `QueryThreatLevelMap` service method in `service-sdr.proto`. For the
    // structure of the Threat Level Map, see the `ThreatLevelMap` message in
    // `talos.proto`.
    uint32 threat_level_map_version = 6;

    // List of FQDNs known to contribute to the "untrusted" or "suspicious"
    // verdict, when such threat level is returned in this response.
    repeated string suspect_domain = 7;

    // Extended, non-visible result data intended for downstream Talos
    // services and engines. Contents of this are subject to change and must
    // NEVER be interpreted by the appliance or application.
    repeated Talos.ServiceData service_data = 8;

    // "First-seen" time with 1 day granularity up to a max of 90 days. After
    // 90 days the domain is considered mature; values returned will indicate
    // the current time minus 90 days. This field most closely aligns with the
    // `domainInit` field in the REST API response.
    uint64 sender_maturity_timestamp = 9;

    // The domain that was first seen the most recently.
    string least_mature_sender = 10;
}

// Results of DNS lookups for various fields in the SMTP envelope.
message EnvelopeDNS {
    // The PTR records for the sender IP address (rdns).
    repeated string sender_ptr = 1;

    // SPF and associated records for the envelope sender (MAIL FROM).
    repeated DNSResult mail_from_spf_rec = 2;

    // SPF and associated records for the HELO/EHLO.
    repeated DNSResult helo_spf_rec = 3;
}

// Results of DNS lookups for various fields in the data phase query.
message DataDNS {
    // The DKIM records for the domains and selectors specified in the query
    // to SDR.
    repeated DNSRecTXT dkim = 1;

    // The DMARC records for the domain specified in the query. This may be
    // multiple records to handle the case where secondary DMARC lookups are
    // required on the organizational domain.
    repeated DNSRecTXT dmarc = 2;
}

// Structure containing DNS lookup results to return to the client and/or use
// for validation (SPF, DKIM, DMARC). The `dkim` and `dmarc` fields are only
// applicable for the data phase query, whereas the preceding fields are all
// applicable to SPF lookups and validation.
message DNSResult {
    // The FQDN used for the lookup (TXT records for <FQDN> and _spf.<FQDN>),
    // and TXT responses in the SPF records.
    repeated DNSRecTXT spf = 1;

    // The FQDN used for the lookup, and the FQDN responses in the MX records.
    repeated DNSRecTXT mx = 2;

    // The FQDN used for the lookup, and the IPv4 address responses in the A
    // records.
    repeated DNSRecA a = 3;

    // The FQDN used for the lookup, and the IPv6 address  responses in the
    // AAAA records.
    repeated DNSRecAAAA aaaa = 4;

    // The *IPv4 address* used for the lookup (not the reversed display IP
    // prepended to `.in-addr.arpa.`) and the FQDN responses in the PTR
    // records.
    repeated DNSRecPTRV4 ptr_v4 = 5;

    // The *IPv6 address* used for the lookup (not the reversed display IP
    // prepended to `.in-addr.arpa.`) and the FQDN responses in the PTR
    // records.
    repeated DNSRecPTRV6 ptr_v6 = 6;

    // The FQDN used for the lookup (i.e., <selector>._domainkey.<FQDN>.), and
    // TXT responses in the DKIM records.
    repeated DNSRecTXT dkim = 7;

    // The FQDN used for the lookup (i.e., FQDNs and org domains prepended
    // with "_dmarc."), and TXT responses in the DMARC records.
    repeated DNSRecTXT dmarc = 8;
}

// DNS lookup results in the form of question and answer strings. Additional
// resource information, such as priority for MX records, TTL, etc., are not
// included.
message DNSRecTXT {
    // The question (i.e., the domain).
    string question = 1;

    // The answers for this question, e.g., multiple IP addresses (in display
    // format) returned for an A record lookup.
    repeated string answer = 2;
}

// A records (IPv4 addresses).
message DNSRecA {
    // The FQDN being queried.
    string fqdn = 1;

    // The list of IPv4 addresses in the response.
    repeated fixed32 ipv4_addr = 2;
}

// AAAA records (IPv6 records).
message DNSRecAAAA {
    // The FQDN being queried.
    string fqdn = 1;

    // The list of IPv6 addresses in the response.
    repeated bytes ipv6_addr = 2;
}

// PTR records for IPv4 addresses.
message DNSRecPTRV4 {
    // The IPv4 address being queried.
    fixed32 ipv4_addr = 1;

    // The list of FQDNs in the response.
    repeated string fqdn = 2;
}

// PTR records for IPv6 addresses.
message DNSRecPTRV6 {
    // The IPv6 address being queried.
    bytes ipv6_addr = 1;

    // The list of FQDNs in the response.
    repeated string fqdn = 2;
}

// Structure for an SDR request made in/after the data phase of the SMTP
// conversation.
message DataRequest {
    // Information about the querying appliance and/or application.
    Talos.AppInfo app_info = 1;

    // Sender IP address and corresponding rdns/PTR.
    // In SDR, only the IP address and Hostname is expected.
    Talos.IPEndpoint endpoint = 2;

    // SMTP envelope details.
    Talos.SMTPEnvelope smtp_envelope = 3;

    // Data from RFC*822 message.
    Talos.MailData mail_data = 4;

    // The ESA's MID.
    uint64 esa_mid = 5;  // aka, "token", in the REST API.

    // Connection details. Be sure to set the connection level GUID in
    // the Talos.IPConnection message. This field is specifically used to get
    // the connection guid.
    Talos.IPConnection connection = 6;

    // Message identifier. This MUST be a 128-bit value. It WILL be rejected if not.
    //
    // Do NOT reuse values. This causes serious issues related to tracking,
    // and can result in your requests being banned. You don't want this happening
    // to customer boxes. You have been warned.
    //
    // Requirement: generate a version 4 (random) UUID.
    // Most programming languages have this as part of the standard library,
    // or a de facto library that can easily be imported.
    bytes msg_guid = 7;
}

// Structure for a reply to an SDR request made in/after the data phase of the
// SMTP conversation.
message DataReply {
    // GUID representing the message. This is how you can track replies.
    bytes msg_guid = 1;

    // ID representing the threat level for this response. The Threat Level
    // map provides the mapping of the threat level ID to mnemonic and
    // description. For how and when to pull the Threat Level Map, see the
    // `QueryThreatLevelMap` service method in `service-sdr.proto`. For the
    // structure of the Threat Level Map, see the `ThreatLevelMap` message in
    // `talos.proto`.
    uint32 threat_level_id = 2;

    // Unix timestamp (Epoch) in milliseconds indicating the time at which SDR
    // received the request.
    uint64 query_ts = 3;

    // IDs representing the threat categories for this response. The Threat
    // Category Map provides the mapping of the threat category ID to
    // mnemonic, name, and description. For how and when to pull the Threat
    // Category Map, see the `QueryThreatCatMap` service method in
    // `service-sdr.proto`. For the structure of the Threat Category Map, see
    // the `ThreatCategoryMap` message in `talos.proto`. There is no limit set
    // on the number of threat category IDs returned.
    repeated uint32 threat_cat_id = 4;

    // Threat Category Map version. This provides context for the threat
    // category IDs (`threat_cat_id`) in this response. If this version is
    // higher than the version of the Threat Category Map you have cached, you
    // must update your copy. For how and when to pull the Threat Category
    // Map, see the `QueryThreatCatMap` service method in `service-sdr.proto`.
    // For the structure of the Threat Category Map, see the
    // `ThreatCategoryMap` message in `talos.proto`.
    uint32 threat_cat_map_version = 5;

    // Threat level map version. This provides context for the threat level
    // IDs (threat_level_id) in this response. If this version is higher than
    // the version of the Threat Level Map you have cached, you must update
    // your copy. For how and when to pull the Threat Level Map see the
    // `QueryThreatLevelMap` service method in `service-sdr.proto`. For the
    // structure of the Threat Level Map, see the `ThreatLevelMap` message in
    // `talos.proto`.
    uint32 threat_level_map_version = 6;

    // List of FQDNs known to contribute to the "untrusted" or "suspicious"
    // verdict, when such threat level is returned in this response.
    repeated string suspect_domain = 7;

    // Extended, non-visible result data intended for downstream Talos
    // services and engines. Contents of this are subject to change and must
    // NEVER be interpreted by the appliance or application.
    repeated Talos.ServiceData service_data = 8;

    // "First-seen" time with 1 day granularity up to a max of 90 days. After
    // 90 days the domain is considered mature; values returned will indicate
    // the current time minus 90 days. This field most closely aligns with the
    // `domainInit` field in the REST API response.
    uint64 sender_maturity_timestamp = 9;

    // The domain that was first seen the most recently.
    string least_mature_sender = 10;
}

// The request to retrieve the mapping of threat category ID to mnemonic,
// name, and description. See Talos.ThreatCategoryMap for the response
// specification.
message ThreatCatMapRequest {
    // Information about the querying appliance and/or application.
    Talos.AppInfo app_info = 1;
}

// The request to retrieve the mapping of threat level ID to name and
// description. See Talos.ThreatLevelMap for the response specification.
message ThreatLevelMapRequest {
    // Information about the querying appliance and/or application.
    Talos.AppInfo app_info = 1;
}

// Deprecated. This structure will be obsoleted and removed soon.
message Request {
    option deprecated = true;

    // Information about the querying appliance and/or application.
    AppInfo app_info = 1;

    // Sender IP address and corresponding rdns/PTR.
    Talos.IPEndpoint endpoint = 2;

    // SMTP envelope details.
    Talos.SMTPEnvelope smtp_envelope = 3;

    // Data from RFC*822 message.
    Talos.MailData mail_data = 4;

    // The ESA's MID.
    uint64 esa_mid = 5;  // aka, "token", in the REST API.

    // Connection details. Be sure to set the connection level GUID in
    // the Talos.IPConnection message.
    Talos.IPConnection connection = 6;

    // GUID representing the message.
    bytes msg_guid = 7;
}

// Deprecated. This structure will be obsoleted and removed soon.
message Reply {
    option deprecated = true;

    // GUID representing the message.
    bytes msg_guid = 1;

    // The threat level.
    uint32 threat_level_id = 2;

    // Unix timestamp (Epoch) in milliseconds indicating the time at which SDR
    // received the request.
    uint64 query_ts = 3;

    // Threat categories identified (by ID).
    repeated uint32 threat_cat_id = 4;

    // Threat category map version. This provides context for the
    // threat category IDs.
    uint32 threat_cat_map_version = 5;

    // Threat level map version. This provides context for the threat
    // level ID.
    uint32 threat_level_map_version = 6;

    // The domain that was first seen the most recently.
    string youngest_domain = 7;

    // List of FQDNs known to contribute to the "untrusted" or "suspicious"
    // verdict (if applicable).
    repeated string suspect_domain = 8;

    // Extended, opaque result data intended for downstream Talos services and
    // engines.
    repeated Talos.ServiceData service_data = 9;
}

// Used cloud-side only by Talos. Other consumers should ignore this structure.
message PrivateLogEnvelopeQuery {
    // Obvious.
    EnvelopeRequest request = 1;

    // Obvious.
    EnvelopeReply reply = 2;

    // Client IP address.
    Talos.IPEndpoint client = 3;

    // Elapsed time, since epoch in milliseconds, request was received.
    uint64 request_received_ts = 4;

    // Elapsed time, since epoch in milliseconds, response was sent.
    uint64 response_sent_ts = 5;

    // gRPC status code of the reply
    uint32 grpc_status_code = 6;
}

// Used cloud-side only by Talos. Other consumers should ignore this structure.
message PrivateLogDataQuery {
    // Obvious.
    DataRequest request = 1;

    // Obvious.
    DataReply reply = 2;

    // Client IP address.
    Talos.IPEndpoint client = 3;

    // Elapsed time, since epoch in milliseconds, request was received.
    uint64 request_received_ts = 4;

    // Elapsed time, since epoch in milliseconds, response was sent.
    uint64 response_sent_ts = 5;

    // gRPC status code of the reply
    uint32 grpc_status_code = 6;
}


