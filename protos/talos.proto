syntax = "proto3";

package Talos;

option go_package = "cisco.com/grpc/talos/common";
option java_package = "talos.common";

/*********************************************************************
 * Fundamental structures and objects.                               *
 *                                                                   *
 * These messages are used in multiple RPC calls in both queries and *
 * results.                                                          *
 *********************************************************************/

/*
 * Extended description of an IP connection.
 *
 * The connection must be identified by a GUID in order to identify it for
 * service logging purposes.
 *
 * These are generic message types, note that not all products will make use
 * of all fields herein. Refer to the referencing protobuf for detail on which
 * fields are required or ignored.
 */
message IPConnection {

    // Enumeration for the direction of the traffic in question, as it relates
    // to the provided IP address.
    enum Direction {
        IP_DIR_IN = 0;  // (server/received)
        IP_DIR_OUT = 1; // (client/initiated)
    }

    // Direction of the traffic.
    Direction direction = 1;

    // IP Protocol. Note that these enumerations do not match official
    // IANA protocol numbers because TCP is the most-often used protocol, and
    // this allows a zero value to be used most of the time.
    enum Protocol {
        IP_PROTO_TCP = 0; // The protocol used is TCP
        IP_PROTO_UDP = 1; // The protocol used is UDP
    }

    // Protocol used by the network traffic to/from this IP address.
    Protocol proto = 2;

    // GUID assigned to this connection for service logging. The same GUID
    // must be sent with every service call related to the same connection.
    // The GUID must be a raw UUIDv4 (128-bit). The GUID may be generated by
    // the client or by using Beaker's GUID service. The GUID is used for
    // correlations with Talos for efficacy purposes.
    bytes guid = 3;

    /*
     * Possible future fields:
     *
     * local interface
     * flow statistics
     * connection state (active, completed)
     * origination and completion time
     */
}

/*
 * Describes an IPv4 or IPv6 address, and optional linkage to an established
 * connection.
 *
 * These are generic message types, note that not all products will make use
 * of all fields herein. Refer to the referencing protobuf for detail on which
 * fields are required or ignored.
 */
message IPEndpoint {
    // The IP address.
    oneof address {
      fixed32 ipv4_addr = 1; // IPv4 address.
      bytes ipv6_addr = 2;   // IPv6 address.
    };

    // Port number associated with this endpoint, if known.
    int32 port = 3;

    // The DNS host name of the IP.
    //
    // For local IPs, this should be the virtual host name (if available at
    // the application protocol level) or the DNS host name the host is using
    // for the local interface. The format should be FQDN (hostname +
    // domainname) if available.
    //
    // For remote IPs (CONNECTION_ROLE_NONE or CONNECTION_ROLE_PEER), this
    // should be value of the DNS PTR record(s).
    repeated string hostname = 4;

    // Enumeration for the role of this connection.
    enum ConnectionRole {
        CONNECTION_ROLE_NONE = 0;  // Endpoint not yet determined.
        CONNECTION_ROLE_PEER = 1;  // Peer endpoint.
        CONNECTION_ROLE_LOCAL = 2; // Local endpoint.
    }

    // The role of this IP endpoint.
    ConnectionRole role = 5;

    // Associated connection details, if available and not already specified
    // at a higher level.
    IPConnection connection = 6;
}


/*
 * The Envelope portion of an email message.
 */
message SMTPEnvelope {
    // The "HELO" SMTP greeting. Can be either `HELO` or `EHLO` followed by
    // the FQDN of the sending host.
    oneof greeting {
      string helo = 1; // The HELO value
      string ehlo = 2; // The EHLO value
    }

    string mail_from = 3; // aka, the envelope-from
    repeated string rcpt_to = 4; // optional for ESA, due to privacy concerns

    /*
     * Fields relevant to validation that can be performed at this level
     */
    bool auth = 5; // Authenticated SMTP connection
    SPFResults spf_results = 6; // Not present if SPF checks weren't performed
}

/*
 * SMTP "DATA" elements.
 */
message MailData {
    /*
     * Reserved [parsed] header fields.  These are expected to be
     * common enough to merit allocation at this level
     *
     * Note: 'from' and 'to' are reserved words in some languages.
     * Hence, these fields are suffixed with '_hdr'
     */

     // From header
    repeated EmailMailbox from_hdr = 1;

    // To header
    repeated EmailMailbox to_hdr = 2;

    // Reply-To header
    repeated EmailMailbox reply_to_hdr = 3;

    // List-related headers, e.g., List-Unsubscribe.
    EmailList list = 4;

    // Explicit indicator that DKIM validation is disabled, since this cannot
    // be deduced from missing results.
    bool dkim_disabled = 5;

    // DKIM validation results
    repeated DKIMDisposition dkim_disp = 6;

    // Explicit indicator that DMARC validation is diabled, since this cannot
    // be deduced from missing results.
    bool dmarc_disabled = 7;

    // DMARC validation results
    DMARCDisposition dmarc_disp = 8;

    // Additional headers, e.g., Message-ID, as required by SDR requests.
    repeated EmailHeader misc_hdrs = 9;
}

// An email address header value
message EmailMailbox {
    // The email address
    string addr = 1;

    // The display/comment part of the email address header
    string display = 2;
}

/*
 * Email list management URLs.
 *
 * See: https://tools.ietf.org/html/rfc2369
 */
message EmailList {
    // List-Help header value. Describes how to obtain information on other
    // list commands.
    repeated string help = 1;

    // List-Unsubscribe header value. Describes the command to unsubscribe the
    // user.
    repeated string unsubscribe = 2;

    // List-Subscribe header value. Describes the command to directly
    // subscribe the user.
    repeated string subscribe = 3;

    // List-Post header value. Describes the method for posting to the list.
    repeated string post = 4;

    // List-Owner header value. Describes the method for contacting the list
    // owner.
    repeated string owner = 5;

    // List-Archive header value. Describes how to access archives for the
    // list.
    repeated string archive = 6;

    // Enumeration indicating the validity of the List-Unsubscribe-Post
    // header. See RFC-8058 for details.
    enum EmailListUnsubPost {
        // The zero value
        EMAIL_LISTUNSUBPOST_NONE = 0;

        // The List-Unsubscribe-Post header is valid (exists and the value of
        // the List-Unsubscribe header is `One-Click`).
        EMAIL_LISTUNSUBPOST_VALID = 1;

        // The List-Unsubscribe-Post is invalid (does not exist or the value
        // of the List-Unsubscribe header is not `One-Click`).
        EMAIL_LISTUNSUBPOST_INVALID = 2;
    }

    // Status of the List-Unsubscribe-Post header.
    EmailListUnsubPost unsub_post = 7;
}

// Structure representing an email header.
message EmailHeader {
    string name = 1;  // The name/label part of the header.
    string value = 2; // The value part of the header.
};

/*
 * Sender Policy Framework result (RFC 7208).
 */
message SPFResults {

    // Enumeration for SPF verdicts.
    enum ResultType {
        // Default. Use when there are no SPF records.
        SPF_RESULT_NONE = 0;

        // Neutral verdict.
        SPF_RESULT_NEUTRAL = 1;

        // SPF pass.
        SPF_RESULT_PASS = 2;

        // SPF fail.
        SPF_RESULT_FAIL = 3;

        // SPF soft fail.
        SPF_RESULT_SOFTFAIL = 4;

        // Temporary error.
        SPF_RESULT_TEMPERROR = 5;

        // Permanent error.
        SPF_RESULT_PERMERROR = 6;

        // SPF validation is not implemented. This value will be returned if
        // the service has not yet implemented SPF validation, but is expected
        // to in a future release. This allows for decoupling service
        // development from platform releases.
        SPF_RESULT_NOT_IMPLEMENTED = 7;
    }

    // The SPF result based on the HELO or EHLO domain.
    ResultType helo = 2;

    // The SPF result based on the envelope-from, aka, "MAIL FROM" in the SMTP
    // envelope conversation, added as the Return-Path header by the receiving
    // server.
    ResultType mail_from = 3;

    // Indicates whether DMARC alignment passes against the (mail_from) domain
    // in this SPF result. Assume "relaxed" alignment if there is no DMARC
    // record or DMARC checks are not enabled.
    bool dmarc_align = 4;
}

// Disposition of DomainKeys Identified Mail verifications.
message DKIMDisposition {
    string domain = 1;   // From the "d=" field of the DKIM signature.
    string selector = 2; // From the "s=" field of the DKIM signature.

    enum DKIMCanon {
        DKIM_CANON_RELAXED = 0;
        DKIM_CANON_STRICT = 1;
    }

    // Canonicalization for email headers.
    DKIMCanon head_canon = 3;

    // Canonicalization for the email body.
    DKIMCanon body_canon = 4;

    // Indicates whether DMARC alignment passes against the domain in this
    // DKIM result. Assume "relaxed" alignment if there is no DMARC record or
    // DMARC checks are not enabled.
    bool dmarc_align = 5;

    // True if "From" is one of the colon-delimited items listed in the "h="
    // section of the DKIM signature.
    bool uses_from_hdr = 6;

    // True if the DKIM signature is valid.
    bool dkim_sig_is_valid = 7;
}

// Disposition of Domain-based Message Authentication, Reporting, and
// Conformance checks.
message DMARCDisposition {
    // The full DMARC record from DNS.
    string record = 1;

    // True if strict alignment is required by the DMARC policy.
    bool strict = 2;

    // True if the message passes DMARC alignment checks.
    bool aligned = 3;
}

/*
 * Application information.
 *
 * This message contains information about the originating device.
 *
 * The following fields are required.
 * * `device_id`
 * * `product_family`
 * * `product_id`
 * * `product_version`
 *
 * If any required fields are missing, a permanent error is returned in the
 * response.
 */
message AppInfo {
    // Identifier for the client (different for each client). The Talos
    // Integrations team determines which identifier this corresponds to for
    // each platform/service. When possible, this is a unique instance
    // identifier, e.g., serial number, MAC address. For cloud solutions, this
    // should be the data center + environment name, e.g., "STL-Dev".
    string device_id = 1;

    // Product family, contact the Talos Integrations team for the value to
    // use here. E.g., CMD, NGFW, ESA, WSA.
    string product_family = 2;

    // Product ID/model, e.g., "S680", contact the Talos Integrations team for
    // the value to use here.
    string product_id = 3;

    // Product release version, e.g., "14.0.0-123". Contact the Talos
    // Integrations team for the value to use here.
    string product_version = 4;

    // Tenant ID for multitenant environments where a tenant ID is available.
    // This allows for debugging and tracking requests by individual tenants.
    // The type here is explicitly non UTF-8 compatible to allow for compact
    // GUIDs to be used.
    bytes tenant_id = 5;

    // Set this field to true when doing performance testing or any other
    // testing where the traffic should not be used for efficacy measurements.
    bool perf_testing = 6;
}

/*
 * Contains geographical coordinates with pertaining metadata.
 */
message GeoCoords {
    // Longitude as a decimal number. This field will be removed in the
    // future, in favor of `longitude_x10000`.
    float longitude = 1;

    // Latitude as a decimal number. This field will be removed in the future,
    // in favor of `latitude_x10000`.
    float latitude = 2;

    // Estimated precision in kilometers.
    uint32 precision = 3;

    // When this location was last updated, in seconds since epoch.
    uint64 last_update_timestamp = 4;

    // Longitude as a decimal number multiplied by 10000. The consumers are
    // expected to divide by 10000 to compute the actual longitude.
    sint32 longitude_x10000 = 5;

    // Latitude as a decimal number multiplied by 10000. The consumers are
    // expected to divide by 10000 to compute the actual longitude.
    sint32 latitude_x10000 = 6;
}

/*
 * Contains geographical location data.
 * The following is an example:
 * {
 *   "locality": "Nashik",
 *   "state_or_province": "Maharashtra",
 *   "postal_code": "422222",
 *   "country": "IN"
 * }
 */
message GeoLocation {
    // Locality, e.g., City name.
    string locality = 1;

    // State or province name.
    string state_or_province = 2;

    // Postal/zip code. Dependent on the region.
    string postal_code = 3;

    // Country code (as defined in
    // https://dev.maxmind.com/geoip/legacy/codes/iso3166/).
    string country = 4;
}

/*
 * Pairing of language code and translation of string to that language.
 */
message LocalizedString {
    // Language identifier (e.g., "en-us", "jp").
    string language = 1;

    // String content (e.g., "sports and leisure").
    string text = 2;
}

// Where the URL was found/specified, if known.
enum URLSource {
    // It is unknown where the URL was found.
    URL_LOCATION_UNSPECIFIED = 0;

    // The URL is being processed by a proxy (e.g., WSA, NGFW, SWG).
    URL_LOCATION_PROXY = 1;

    // The URL was found in an email header (other than List-Unsubscribe).
    URL_LOCATION_EMAIL_HEADER = 2;

    // The URL was found in an email body.
    URL_LOCATION_EMAIL_BODY = 3;

    // The URL was found in an email attachment.
    URL_LOCATION_EMAIL_ATTACHMENT = 4;

    // The URL is in a list unsubcribe email header.
    URL_LOCATION_EMAIL_UNSUBSCRIBE = 5;
}

/*
 * Uniform Resource Locator.
 */
message URL {
    // The URL as a string. This can be empty for an IP-only query.
    string raw_url = 1;

    // The list of containers for IPs associated with the host name part of
    // the URL. If not provided in the request, the IPs will be looked up on
    // the server side. If the client does not otherwise need the IP addresses
    // associated with the host part of the URL, it is generally recommended
    // to allow the lookup to happen on the server side. To provide IP
    // addresses, be sure to add the IP to the `address` field in
    // `Talos.IPEndpoint`.
    //
    // Why would you already have the IP address(es) associated with the URL?
    // E.g., if you are making gRPC calls from a web proxy, you will need the
    // IP addresses to know where to connect to, assuming the destination does
    // not have a bad reputation.
    repeated Talos.IPEndpoint endpoint = 2;

    // Where the URL was found, if known.
    URLSource source = 3;
}

/*
 * Describes version endpoints for map elements. `starting` and `ending` are
 * inclusive, and an `ending` value of 0 means unspecified. The fields
 * indicate which map versions that a particular element in a map (AUP
 * category, threat category, threat level, etc.) is valid for.  `starting`
 * may be a future version (greater than the current map version), indicating
 * that the map element is planned for release. `ending` may be a future
 * version, indicating a planned deprecation, or past version, indicating the
 * element has already been deprecated, or may be zero, meaning there are no
 * current plans for deprecation of the element. Integrators must gracefully
 * handle all of these scenarios.
 *
 * * Example 1: Map version is 3, version range is
 * `{ "starting": 1, "ending": 0 }`
 *
 * This indicates that the map element has been active since map version 1,
 * and there is no planned deprecation for this element.
 *
 *
 * * Example 2: Map version is 3, version range is
 * `{ "starting": 1, "ending": 3 }`
 *
 * This indicates that the map element has been active since map version 1,
 * and the current map version (3) is the last version for which this
 * element is valid. That is, it is expected that the next map update will
 * mark the element as inactive (`is_avail` = false). However, integrators
 * must handle the case where this gets delayed and the next map update
 * actually increases the "ending" version to 4 or beyond.
 *
 *
 * * Example 3: Map version is 3, version range is
 * `{ "starting": 1, "ending": 2 }`
 *
 * This indicates that the map element was previously active, but was
 * deprecated when the current map version was published.
 *
 * * Example 4: Map version is 3, version range is
 * `{ "starting": 4, "ending": 0 }`
 *
 * This indicates that the map element is not yet active, but is present
 * as an announcement that it will be active in an upcoming release of the
 * map. That is, it is expected that the next map update will mark the
 * element as active (`is_avail` = true). However, integrators must handle
 * the case where this gets delayed and the next map update increases
 * the "staring" version to 5 or beyond.
 */
message VersionRange {
    // The map version at which this entry will (or became) valid.
    // If unspecified, entry's validity predates versioning.
    uint32 starting = 1;

    // The map version through which this entry is (or was) valid.
    // If unspecified, entry is valid indefinitely.
    uint32 ending = 2;
}

/*
 * Describes additions, deletions, merges, and splits. The wrapping structure
 * is to allow for fields to be added in the future. A value of zero as the
 * first element of a list means that item referred to by the second element
 * is being added. A value of zero as the second element of a list means that
 * item referred to by the first element is being removed (deprecated).
 *
 * An empty `delta_entry` is possible and MUST be accepted. This indicates
 * cosmetic changes to the map, e.g. short or long description fields.
 * Description updates MUST be incorporated into future logging and displays.
 *
 * Example:
 *    { "delta": [
 *            { "version": 2,
 *              "delta_entry": [
 *                        { "from_id": 26, "to_id": 73 },
 *                        { "from_id": 26, "to_id": 72 },
 *                        { "from_id": 29, "to_id": 0 },
 *                        { "from_id": 0, "to_id": 74 }
 *                    ]
 *            },
 *            { "version": 3,
 *              "delta_entry": [
 *                    { "from_id": 0, "to_id": 94 },
 *                    { "from_id": 0, "to_id": 95 }
 *                ]
 *            },
 *            { "version": 4,
 *              "delta_entry": []
 *            }
 *        ]
 *    }
 *
 *
 * See the `VersionDelta` message for examples of additions, deletions,
 * splits, and merges.
 */
 message VersionMeta {
     // The deltas
     repeated VersionDelta delta = 1;
 }

/*
 * Delta for a single version.
 *
 * * Example 1: the delta between version 1 and version 2, where ID 26 was
 * split into 73 and 72, 29 was obsoleted, and 74 was added:
 *
 *   { "version": 2,
 *     "delta_entry": [
 *       { "from_id": 26, "to_id": 73 },
 *       { "from_id": 26, "to_id": 72 },
 *       { "from_id": 29, "to_id": 0 },
 *       { "from_id": 0, "to_id": 74 }
 *     ]
 *   }
 *
 *
 * * Example 2: addition: IDs 76 and 76 were added in version 3.
 *
 *   { "version": 3,
 *     "delta_entry": [
 *       { "from_id": 0, "to_id": 75 },
 *       { "from_id": 0, "to_id": 76 },
 *     ]
 *   }
 *
 *
 * * Example 3: deletion: ID 71 is deleted in version 4.
 *
 *   { "version": 4,
 *     "delta_entry": [
 *       { "from_id": 71, "to_id": 0 },
 *     ]
 *   }
 *
 *
 * Example 4: split: ID 26 is split into 72 and 73 in version 5.
 *
 *   { "version": 5,
 *     "delta_entry": [
 *       { "from_id": 26, "to_id": 72 },
 *       { "from_id": 26, "to_id": 73 },
 *     ]
 *   }
 *
 *
 * Example 5: merge: IDs 24 and 25 are merged into 77 in version 6.
 *
 *   { "version": 5,
 *     "delta_entry": [
 *       { "from_id": 24, "to_id": 77 },
 *       { "from_id": 25, "to_id": 77 },
 *     ]
 *   }
 *
 * Example 6: the delta only includes cosmetic changes.
 *
 *   { "version": 6,
 *     "delta_entry": []
 *   }
 */
 message VersionDelta {
     // The version for which this is the delta from the previous version.
     uint32 version = 1;

     // Mapping for the transition from (`version` - 1) to `version`.
     // An empty delta_entry indicates only cosmetic changes.
     repeated VersionDeltaEntry delta_entry = 2;
 }

/*
 * One entry for a version delta (see the `VersionDelta` message).
 */
 message VersionDeltaEntry {
     // ID for item that is changing. A value of zero indicates that the item
     // represented by `to_id` is being added.
     uint32 from_id = 1;

     // ID for item that `from_id` is changing to. A value of zero indicates
     // that the item respresented by `from_id` is deleted (obsoleted, will
     // not appear in new data, but the mapping will still exist for
     // reporting, etc.).
     uint32 to_id = 2;
 }

/*
 * Standardized identification of Threat Categories (also known as security
 * categories). This structure is solely for providing partial or complete
 * maps and not for listing threat categories in responses (which are
 * identified only by numeric ID). Full maps are always returned from the
 * current service methods returning maps. New service
 * methods may be added in the future that return partial maps containing on
 * the IDs requested. Refer to the
 * [Talos Intelligence Usage Guidance](https://wiki.cisco.com/x/P3vGH)
 * document for map usage guidance.
 */
message ThreatCategory {
    // Threat Category ID.
    //
    // Valid values begin with (1).
    uint32 threat_cat_id = 1;

    // Unique mnemonic. This is a short name that uniquely identifies the
    // threat category. The mnemonic for a given ID will never change.
    string threat_cat_mnemonic = 2;

    // Short Description, also known as Name. This field is a short
    // description intended for display in UIs, reports, etc. The name is
    // limited to 50 characters in length.
    repeated LocalizedString desc_short = 3;

    // Long Description, also known as Description. This is a more detailed
    // description of the threat category for display in help pages and help
    // bubbles. It is intended to be the full description of the category for
    // customer consumption. The description is limited to 750 characters in
    // length.
    repeated LocalizedString desc_long = 4;

    // Do not use this field, as it is deprecated in favor of `is_avail`.
    // Whether or not this category is being deprecated.
    reserved 5;
    reserved "is_deprecated";

    // Availability detail. See the `VersionRange` message for usage.
    VersionRange vers_avail = 6;

    // Whether the category is active in this version of the category map.
    // This can also be deduced from the vers_avail ranges in conjunction with
    // the map version.
    //
    // If this field is present, the is_deprecated field (if present) should
    // be ignored. Categories with is_deprecated set will be removed in a
    // future specification.
    //
    // If this field is not present, the category may be assumed to be
    // available.
    bool is_avail = 7;
}

/*
 * A list of Threat Categories. This message is used to provide an
 * authoritative mapping of all threat categories. Talos may also use it in
 * the future to describe IDs referenced in context (in a future service
 * method). The `map_is_complete` field specifies whether this is a complete
 * mapping of all threat categories or only specific ones. Refer to the
 * [Talos Intelligence Usage Guidance](https://wiki.cisco.com/x/P3vGH)
 * document for how to use this map and threat categories.
 */
message ThreatCategoryMap {
    // Mapping of threat category IDs to mnemonic, name, and description.
    repeated ThreatCategory threat_cats = 1;

    // The version of this threat category map. Whenever
    // `threat_cat_map_version` in a response from a `QueryReputation` service
    // method call is larger than this version, integrators must make the
    // appropriate `QueryThreatCatMap` service method call to retrieve the
    // latest version of the map.
    uint32 version = 2;

    // A threat category to be used when none were found, but a blocking score
    // has been generated. Applies only to complete maps.
    uint32 default_threat_cat_id = 3;

    // Whether this is a complete map.
    bool map_is_complete = 4;

    // Meta data describing the deltas between map versions. See the
    // `VersionMeta` message for details.
    VersionMeta version_meta = 5;
}


/*
 * Standardized identification of Acceptable Use Categories (AUP Categories).
 * This structure is solely for providing partial or complete maps and not
 * for listing AUP categories in responses (which are identified only by
 * numeric ID). Full maps are always returned from the current service
 * methods returning maps. New service methods may be added in the future
 * that return partial maps containing on the IDs requested. Refer to the
 * [Talos Intelligence Usage Guidance](https://wiki.cisco.com/x/P3vGH)
 * for how to use this map and AUP categories.
 */
message AUPCategory {
    // Acceptable Use Category ID.
    //
    // Valid values begin with (1).
    uint32 aup_cat_id = 1;

    // Unique mnemonic. This is a short name that uniquely identifies the
    // AUP category. The mnemonic for a given ID will never change.
    string aup_cat_mnemonic = 2;

    // Short Description, also known as Name. This field is a short
    // description intended for display in UIs, reports, etc. The name is
    // limited to 50 characters in length.
    repeated LocalizedString desc_short = 3;

    // Long Description, also known as Description. This is a more detailed
    // description of the threat category for display in help pages and help
    // bubbles. It is intended to be the full description of the category for
    // customer consumption. The description is limited to 750 characters in
    // length.
    repeated LocalizedString desc_long = 4;

    // Do not use this field, as the field itself is deprecated in favor of
    // is_avail.
    // Whether or not this category is being deprecated.
    reserved 5;
    reserved "is_deprecated";

    // Availability detail. See the `VersionRange` message for usage.
    VersionRange vers_avail = 6;

    // Whether the category is active in this version of the category map.
    // This can also be deduced from the vers_avail ranges in conjunction with
    // the map version.
    //
    // If this field is present, the is_deprecated field (if present) should
    // be ignored. Categories with is_deprecated set will be removed in a
    // future specification.
    //
    // If this field is not present, the category may be assumed to
    // be available.
    bool is_avail = 7;
}

/*
 * A list of Acceptable Use Categories (AUP Categories). This message is
 * used to provide an authoritative mapping of all AUP categories. Talos
 * may also use it in the future to describe IDs referenced in context (in a
 * future service method). The `map_is_complete` field specifies whether this
 * is a complete mapping of all AUP categories or only specific ones.
 * Refer to the
 * [Talos Intelligence Usage Guidance](https://wiki.cisco.com/x/P3vGH)
 * document for how to use this map and AUP categories.
 */
message AUPCategoryMap {
    // Mapping of AUP category IDs to mnemonic, name, and description.
    repeated AUPCategory aup_cats = 1;

    // The version of this AUP category map. Whenever `aup_cat_map_version` in
    // a response from a `QueryReputation` service method call is larger than
    // this version, integrators must make the appropriate `QueryAUPCatMap`
    // service method call to retrieve the latest version of the map.
    uint32 version = 2;

    // Whether this is a complete map.
    bool map_is_complete = 3;

    // Meta data describing the deltas between map versions. See the
    // `VersionMeta` message for details.
    VersionMeta version_meta = 5;
}

/*
 * Standardized identification of Threat Levels. This structure is solely for
 * providing partial or complete maps and not for listing threat levels in
 * responses (which are identified only by numeric ID). Full maps are always
 * returned from the current service methods returning maps. New service
 * methods may be added in the future that return partial maps containing on
 * the IDs requested. Refer to the
 * [Talos Intelligence Usage Guidance](https://wiki.cisco.com/x/P3vGH)
 * for how to use this map and threat levels.
 */
message ThreatLevel {
    // Threat Level ID.
    //
    // Valid values begin with (1).
    uint32 threat_level_id = 1;

    // Unique mnemonic. This is a short name that uniquely identifies the
    // threat category. The mnemonic for a given ID will never change.
    string threat_level_mnemonic = 2;

    // Lower threshold (inclusive) for this threat level. Clients are expected
    // to divide this number by 10 to compute the actual threshold. New
    // integrations are to ignore this and only use the threat level they are
    // provided in verdicts.
    sint32 score_lower_bound_x10 = 3;

    // Upper threshold (inclusive) for this threat level. Clients are expected
    // to divide this number by 10 to compute the actual threshold. New
    // integrations are to ignore this and only use the threat level they are
    // provided in verdicts.
    sint32 score_upper_bound_x10 = 4;

    // Short Description, also known as Name. This field is a short
    // description intended for display in UIs, reports, etc. The name is
    // limited to 50 characters in length.
    repeated LocalizedString desc_short = 5;

    // Long Description, also known as Description. This is a more detailed
    // description of the threat category for display in help pages and help
    // bubbles. It is intended to be the full description of the category for
    // customer consumption. The description is limited to 750 characters in
    // length.
    repeated LocalizedString desc_long = 6;

    // Availability detail. See the `VersionRange` message for usage.
    VersionRange vers_avail = 7;

    // Whether the threat level is active in this version of the threat level
    // map.  This can also be deduced from the vers_avail ranges in
    // conjunction with the map version.
    bool is_avail = 8;

    // An index to use for sorting (by consumers). Ascending order is least
    // trusted to most trusted. This is useful for displaying in UIs, as well
    // as for determining what to block (e.g., blocking "questionable" and
    // worse).
    uint32 sort_index = 9;
}

/*
 * A list of Threat Levels. This message is used to provide an authoritative
 * mapping of all threat levels. Talos may also use it in the future to
 * describe IDs referenced in context (in a future service method). The
 * `map_is_complete` field specifies whether this is a complete mapping of
 * all threat levels or only specific ones. Refer to the
 * [Talos Intelligence Usage Guidance](https://wiki.cisco.com/x/P3vGH)
 * document for how to use this map and threat levels.
 */
message ThreatLevelMap {
    // Mapping of threat level IDs to mnemonic, name, and descripton.
    repeated ThreatLevel threat_levels = 1;

    // The version of this threat level map. Whenever
    // `threat_level_map_version` in a response from a `QueryReputation`
    // service method call is larger than this version, integrators must make
    // the appropriate `QueryThreatLevelMap` service method call to retrieve
    // the latest version of the map.
    uint32 version = 2;

    // Whether this is a complete map.
    bool map_is_complete = 3;

    // Meta data describing the deltas between map versions.
    VersionMeta version_meta = 4;
}

/*
 * Deprecated: DO NOT USE.
 *
 * A list of tags. This message may be used to describe a particular
 * set of tags referenced in context, or to provide an authoritative
 * mapping of all tags.
 *
 * Do not use in new integrations.
 */
message TagMap {
    // Mapping of tag IDs to mnemonics, descriptions, etc.
    repeated Tag tags = 1;

    // The tag map version which these tags comprise (or to which they
    // belong).
    uint32 version = 2;

    // Whether this is a complete map.
    bool map_is_complete = 3;

    // Meta data describing the deltas between map versions. See the
    // `VersionMeta` message for details.
    VersionMeta version_meta = 4;
}

/*
 * Deprecated: DO NOT USE.
 *
 * Standardized identification of tags. This structure is solely for providing
 * partial or complete maps and not for listing tags in responses (which are
 * identified only by numeric ID).
 *
 * Do not use in new integrations.
 */
message Tag {
    // Tag ID.
    //
    // Valid values begin with (1).
    uint32 tag_id = 1;

    // Unique mnemonic.
    string tag_mnemonic = 2;

    // Short Description.
    repeated LocalizedString desc_short = 3;

    // Long Description.
    repeated LocalizedString desc_long = 4;

    // Availability detail.
    VersionRange vers_avail = 5;

    // Whether the tag is active in this version of the tag map. This can also
    // be deduced from the vers_avail ranges in conjunction with the map
    // version.
    //
    // If this field is not present, the category may be assumed to be
    // available.
    bool is_avail = 6;
}

/*
 * Standardized identification of Reputation Rules. This structure is solely
 * for providing partial or complete maps and not for listing reputation
 * rules in responses (which are identified only by numeric ID). Full maps
 * are always returned from the current service methods returning maps. New
 * service methods may be added in the future that return partial maps
 * containing only the IDs requested. Reputation rules are not for use by
 * non-Talos integrators, other than to pass on the data to other Talos
 * engines.
 */
message ReputationRule {
    // Rule ID.
    //
    // Valid values begin with (1).
    uint32 rep_rule_id = 1;

    // Unique mnemonic. This is a short name that uniquely identifies the
    // threat category. The mnemonic for a given ID will never change.
    string rule_mnemonic = 2;

    // Short Description, also known as Name. This field will be empty, but is
    // left here for historical purposes.
    repeated LocalizedString desc_short = 3;

    // Long Description, also known as Description. This field will be empty,
    // but is left here for historical purposes.
    repeated LocalizedString desc_long = 4;

    // Availability detail.
    VersionRange vers_avail = 5;

    // Whether the rule is active in this version of the rule map. This can
    // also be deduced from the vers_avail ranges in conjunction with the map
    // version.
    //
    // If this field is not present, the rule may be assumed to be available.
    bool is_avail = 6;
}

/*
 * Reputation rules are not for use by non-Talos integrators, other than to
 * pass on the data to other Talos engines.
 *
 * A list of Reputation Rules. This message is used to provide an
 * authoritative mapping of all repuation rules. Talos may also use it in the
 * future to describe IDs referenced in context (in a future service method).
 * The `map_is_complete` field specifies whether this is a complete mapping of
 * all reputation rules or only specific ones.
 */
message ReputationRuleMap {
    // Mapping of reputation rule ID to mnemonic.
    repeated ReputationRule rules = 1;

    // The version of this rule map. Whenever `rule_map_version` in a response
    // from a `QueryReputation` service method call is larger than this
    // version, integrators must make the appropriate `QueryRuleMap` service
    // method call to retrieve the latest version of the map.
    uint32 version = 2;

    // Whether this is a complete map.
    bool map_is_complete = 3;
}


/*
 * Opaque data intended for handling by local service (e.g., CASE).
 */
message ServiceData {

    // Name of the service, e.g., "spamd".
    string service_name = 1;

    // Message type, qualified by namespace, e.g., "Talos.CASE.SDRResults".
    string message_type = 2;

    // Message payload. This data is expected to be binary (not UTF-8
    // compatible), e.g., a raw protobuf. This data is meant to be passed to
    // Talos engines without interpretation by integrators. The format and
    // contents will be changed without notification to integrators. If
    // converting to JSON, base-64 encode this value to make it safe for JSON.
    bytes data = 3;

}

/*
 * Generic empty reply message. Used to avoid unnecessarily definining empty
 * messages in various places.
 */
message EmptyReply {

}
