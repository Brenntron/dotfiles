/*
 * URL Reputation
 */

syntax = "proto3";

import "talos.proto";

package Talos.URS;

option go_package = "cisco.com/grpc/talos/urs";
option java_package = "talos.urs";

// Structure for a URL or web IP reputation query.
message ReputationRequest {
    // Information about the querying appliance and/or application.
    Talos.AppInfo app_info = 1;

    // Connection details. Be sure to set the `guid` field in
    // `Talos.IPConnection` to the connection-level GUID associated with the
    // current client connection. For email, this is the GUID for the SMTP
    // connection. For web proxies and firewalls, this is the GUID for the
    // outbound connection to the web site. However, the Talos Integrations
    // team is responsible for indicating how this field applies to each
    // client.
    Talos.IPConnection connection = 2;

    // Message-level GUID. For email, this is the GUID for the email message.
    // For web proxies and firewalls, this is the GUID for the URL itself. If
    // the usage is unclear, consult the Talos Integrations team for guidance
    // for your use case. The GUID must be a raw UUIDv4 (128-bit), and may be
    // generated by the client or by using Beaker's GUID service. Talos uses
    // the GUID for correlations for efficacy and support purposes.
    bytes msg_guid = 3;

    // URLs to retrieve reputation information for. The URLs should include
    // the protocol if the client has it, in order to ensure the proper
    // information is returned. For batch queries, batches of 25 or less URLs
    // are recommended for optimum query latency.
    repeated Talos.URL url = 4;

    // Explicit flag to indicate that each Fully Qualified Domain Name (FQDN)
    // in URLs should not be resolved to IPs on the server side. The default
    // case is to perform DNS lookups in the cloud. If you do not wish this to
    // happen, set this field to true. For efficacy purposes, the flag should
    // only be set to true if the DNS lookups have already been performed (in
    // which case the IPs must be provided in the request to receive proper
    // verdicts), or for research purposes, etc., where the IP address
    // contribution to the verdict is to be purposefully ignored.
    bool do_not_resolve_dns = 5;

    // Deprecated: Do not use in new integrations.
    // The blocking threshold set by the customer, if customizable. This
    // allows for returning threat categories for URLs with reputation scores
    // above the recommended blocking threshold (up to an internally defined
    // limit). If the blocking threshold is unknown or not applicable, set the
    // value to 0. Talk to a representative from the Talos Integrations team
    // before setting this threshold to something other than 0. Clients are
    // expected to divide this number by 10 to compute the actual threshold.
    sint32 reputation_block_threshold_x10 = 6;

    // True if a value for `reputation_block_threshold_x10` is not specified.
    // The distinction is needed here, since unspecified and a value of zero
    // are identical in protobuffers version 3.
    bool no_reputation_block_threshold = 7;
}

// Structure of the response to a reputation query.
message ReputationReply {
    // Connection-level GUID provided in the request. This must be preserved
    // and included in related requests to other Talos services. The GUID is
    // used by Talos for correlating results from multiple engines to improve
    // efficacy and to implement certain features, such as CUA (Cloud URL
    // Analysis). Integrators may wish to log the GUID for debugging purposes.
    bytes connection_guid = 1;

    // Message-level GUID provided in the request. This must be preserved
    // and included in related requests to other Talos services. The GUID is
    // used by Talos for correlating results from multiple engines to improve
    // efficacy and to implement certain features, such as CUA (Cloud URL
    // Analysis). Integrators may wish to log the GUID for debugging purposes.
    bytes msg_guid = 2;

    // Result set. One result will be provided for each URL queried.
    repeated URLResult result = 3;

    // AUP category map version. This provides context for the AUP category
    // IDs in URLResult. Call the `URS/QueryAUPCatMap` service method to
    // obtain an updated AUP category mapping if `aup_cat_map_version` is
    // greater than the one you have cached.
    uint32 aup_cat_map_version = 4;

    // Threat category map version. This provides context for the threat
    // category IDs in URLResult. Call the `URS/QueryThreatCatMap` service
    // method to obtain an updated threat category mapping if
    // `threat_cat_map_version` is greater than the one you have cached.
    uint32 threat_cat_map_version = 5;

    // Threat level map version. This provides context for the threat level
    // IDs in URLResults. Call the `URS/QueryThreatLevelMap` service method to
    // obtain an updated threat level mapping if `threat_level_map_version` is
    // greater than the one you have cached.
    uint32 threat_level_map_version = 6;

    // Tag map version. This provides context for the tag IDs in URLResults.
    // Call the `URS/QueryTagMap` service method to obtain an updated tag
    // mapping if `tag_map_version` is greater than the one you have cached.
    uint32 tag_map_version = 7;
}

// For Talos Internal Use Only.
message PrivateReputationReply {
    // Private reputation reply.
    ReputationReply reply = 1;

    // SDS-only field: e.g. *.cisco.com/*.
    string cache_hint = 2;

    // How long you want the cache to be stale for.
    uint32 cache_ttl = 3;
}

// For Talos Internal Use Only.
message PrivateLog {
    // Private reputation request.
    ReputationRequest request = 1;

    // Private reputation reply.
    ReputationReply reply = 2;

    // Client IP address.
    Talos.IPEndpoint client = 3;

    // Time since epoch in milliseconds, request was received.
    uint64 request_received_ts = 4;

    // Time since epoch in milliseconds, response was sent.
    uint64 response_sent_ts = 5;

    // gRPC status code of the reply.
    uint32 grpc_status_code = 6;
}

// For Talos Internal Use Only.
message PrivateLogV2 {
    // The request structure passed to the `QueryReputationV2` or
    // `QueryReputation` service method.
    ReputationRequest request = 1;

    // The reply returned by a call to the `QueryReputationV2` service method.
    // In addition, replies from calls to `QueryReputation` are restructured
    // to match `ReputationReplyV2` and included here.
    ReputationReplyV2 reply = 2;

    // Client IP address.
    Talos.IPEndpoint client = 3;

    // Time since epoch in milliseconds, request was received.
    uint64 request_received_ts = 4;

    // Time since epoch in milliseconds, response was sent.
    uint64 response_sent_ts = 5;

    // gRPC status code of the reply
    uint32 grpc_status_code = 6;
}

// Structure of the response to a reputation query.
message ReputationReplyV2 {
    // GUID provided in the request. This must be preserved and included in
    // related requests to other services. The GUID is used by Talos for
    // correlating results from multiple engines to improve efficacy and to
    // implement certain features, such as CUA (Cloud URL Analysis).
    // Integrators may wish to log the GUID for debugging purposes.
    bytes connection_guid = 1;

    // Message-level GUID provided in the request. This must be preserved and
    // included in related requests to other services. The GUID is used by
    // Talos for correlating results from multiple engines to improve efficacy
    // and to implement certain features, such as CUA (Cloud URL Analysis).
    // Integrators may wish to log the GUID for debugging purposes.
    bytes msg_guid = 2;

    // Result set. One result will be provided for each URL queried.
    repeated URLVerdict result = 3;

    // AUP Category Map version. This provides context for the AUP
    // Category IDs (`aup_cat_id`) in `URLVerdict`. If this version is
    // higher than the version of the AUP Category Map you have cached, you
    // must update your copy. For how and when to pull the AUP Category Map,
    // see the `QueryAUPCatMap` service method in `service-urs.proto`. For
    // the structure of the AUP Category Map, see the `AUPCategoryMap`
    // message in `talos.proto`.
    uint32 aup_cat_map_version = 4;

    // Threat Category Map version. This provides context for the threat
    // category IDs (`threat_cat_id`) in `URLVerdict`. If this version is
    // higher than the version of the Threat Category Map you have cached, you
    // must update your copy. For how and when to pull the Threat Category
    // Map, see the `QueryThreatCatMap` service method in `service-urs.proto`.
    // For the structure of the Threat Category Map, see the
    // `ThreatCategoryMap` message in `talos.proto`.
    uint32 threat_cat_map_version = 5;

    // Threat level map version. This provides context for the threat level
    // IDs (threat_level_id) in `URLVerdict`. If this version is higher than
    // the version of the Threat Level Map you have cached, you must update
    // your copy. For how and when to pull the Threat Level Map see the
    // `QueryThreatLevelMap` service method in `service-urs.proto`. For the
    // structure of the Threat Level Map, see the `ThreatLevelMap` message in
    // `talos.proto`.
    uint32 threat_level_map_version = 6;

    // Deprecated. Ignore.
    // Tag map version. This provides context for the tag IDs in URLResults.
    // Call the `URS/QueryTagMap` service method to obtain an updated tag
    // mapping if `tag_map_version` is greater than the one you have cached..
    uint32 tag_map_version = 7;
}

// Container for a list of results for a query about a single URL, as well as
// any associated/intermediate results for supported shortened URLs or
// encapsulating proxies. The first item in the list is the final result after
// shortened URLs and encapsulating proxies have been unwrapped and will have
// AssociatedResultType `ASSOCIATED_RESULT_TYPE_NONE`. The list will contain a
// maximum of 10 items, at which point the final verdict will be a blocking
// score with no rule hits (`rep_rule_id` will be empty). The list is in
// reverse order of traversal. That is:
//
// The list: `destination URL (head) <- p <- p <- p <- source URL (tail)`
//
// Integrators should work with the Talos Integration team for guidance on
// using the associated results, presenting in UIs, etc.
message URLVerdict {
    repeated URLResultV2 result = 1;
}

// Structure of the results for a single URL.
message URLResultV2 {
    // ID representing the threat level for this response. The Threat Level
    // map provides the mapping of the threat level ID to mnemonic and
    // description. For how and when to pull the Threat Level Map, see the
    // `QueryThreatLevelMap` service method in `service-urs.proto`. For the
    // structure of the Threat Level Map, see the `ThreatLevelMap` message in
    // `talos.proto`.
    uint32 threat_level_id = 1;

    // Deprecated: do not use the score in new integrations, as the score will
    // be removed in a future version. Use the the threat level
    // (`threat_level_id`) instead.
    // The URL/IP reputation score encoded at 10x to facilitate integer
    // encoding. Clients are expected to convert back to single-decimal place
    // by multiplying by 10. For legacy integrations, refer to the [Talos
    // Intelligence Usage Guidance](https://wiki.cisco.com/x/P3vGH) document
    // for how to use and display the reputation score.Use the the threat
    // level (`threat_level_id`) instead.
    sint32 reputation_score_x10 = 2;

    // If true, ignore the the reputation_x10 field, as the threat level is
    // "unknown".
    bool no_reputation_score = 3;

    // IDs representing the threat categories for this response. The Threat
    // Category Map provides the mapping of the threat category ID to
    // mnemonic, name, and description. For how and when to pull the Threat
    // Category Map, see the `QueryThreatCatMap` service method in
    // `service-urs.proto`. For the structure of the Threat Category Map, see
    // the `ThreatCategoryMap` message in `talos.proto`. There is no limit set
    // on the number of threat category IDs returned.
    repeated uint32 threat_cat_id = 4;

    // IDs representing the AUP categories for this response. The AUP Category
    // Map provides the mapping of the AUP category ID to mnemonic, name, and
    // description. For how and when to pull the AUP Category Map, see the
    // `QueryAUPCatMap` service method in `service-urs.proto`. For the
    // structure of the AUP Category Map, see the `AUPCategoryMap` message in
    // `talos.proto`. The first ID in the list represents the primary AUP
    // category. The remaining IDs represent secondary categories, in no
    // particular order. The list is limited to 5 IDs per URL.
    repeated uint32 aup_cat_id = 5;

    // Deprecated: ignore.
    // Tag ID list. This is a method to apply a tag to the result that
    // customers can filter on, but it does not fit in with AUP categories or
    // threat categories. E.g., TOR exit nodes, NSD, and other things that
    // should not be AUP categories. Some of these may also be threat
    // categories, but the customer should be able to filter on them when the
    // score is non-blocking. See the `QueryTagMap` service method to retrieve
    // a mapping of tag ID to mnemonic, name, and description. There is no
    // limit on the number tag IDs returned per URL.
    repeated uint32 tag_id = 6;

    // Deprecated: do not use in future integrations.
    // The domain initialization timestamp. This is the creation date if Talos
    // has it. Otherwise, it represents the first time the backend systems saw
    // the domain.
    int64 domain_init = 7;

    // The URL this result is for. This is an empty string for the source URL.
    // If the source URL is a supported shortened URL or encapsulating proxy,
    // then `result_type` will indicate the type of result this is (see the
    // `AssociatedResultType` enum).
    string url = 9;

    // For Talos Internal Use Only.
    // IDs representing the Talos reputation rule hits associated with this
    // URL address. The Reputation Rule Map provides the mapping of the
    // reputation rule ID to mnemonic (needed by Talos engines in some
    // instances, such as CASE on ESA). Reputation rule hits are for internal
    // Talos use only, and no descriptions are provided. Non-Talos consumers
    // are to ignore this field, other than to pass it on to Talos engines
    // upon request. For how and when to pull the Reputation Rule Map, see the
    // `QueryRuleMap` service method in `service-urs.proto`. For the structure
    // of the Reputation Rule Map, see the `ReputationRuleMap` message in
    // `talos.proto`.
    repeated uint32 rep_rule_id = 10;

    // Enumeration for URL processing errors
    enum URLError {
        // No error.
        ERROR_NONE = 0;

        // Contacting the URL shortener service to resolve the target URL
        // failed. Clients should consider resubmitting the request for this
        // URL.
        ERROR_SHORTENER_FAIL = 1;

        // General cloud-side error while processing the URL. This should be
        // logged by the client and the client should consider resubmitting
        // the request for this URL.
        ERROR_INTERNAL = 2;

        // Invalid parameter passed in the request. This should be logged, but
        // a retry should not be performed with the same request data.
        ERROR_INVALID_REQUEST = 3;
    }

    // Error from processing the URL, if any. A value of zero
    // (`URL_RESULT_ERROR_NONE`) means no error.
    URLError error = 11;

    // If an error occurred, indicates the error is temporary and
    // suggest the operation can be retried.
    bool error_is_temporary = 12;

    // Enumeration for associated result types
    enum AssociatedResultType {
        // No associated results
        ASSOCIATED_RESULT_TYPE_NONE = 0;

        // Encapsulated proxy
        ASSOCIATED_RESULT_TYPE_EP = 1;

        // Shortened URL
        ASSOCIATED_RESULT_TYPE_SHORT_URL = 2;

        // URL previously rewritten by ESA
        ASSOCIATED_RESULT_TYPE_RWR_URL = 3;
    }

    // The type of associated result
    AssociatedResultType result_type = 13;
}

// Do not use in new integrations.
// Deprecated, as is the `QueryReputation` service method in `urs.proto`.
// Structure of the results for a single URL.
message URLResult {
    // ID representing the threat level for this response. The Threat Level
    // map provides the mapping of the threat level ID to mnemonic and
    // description. For how and when to pull the Threat Level Map, see the
    // `QueryThreatLevelMap` service method in `service-urs.proto`. For the
    // structure of the Threat Level Map, see the `ThreatLevelMap` message in
    // `talos.proto`.
    uint32 threat_level_id = 1;

    // Do not use the score in new integrations, as the score will be removed
    // in a future version. Use the the threat level (`threat_level_id`)
    // instead.
    // The URL/IP reputation score encoded at 10x to facilitate integer
    // encoding. Clients are expected to convert back to single-decimal place
    // by multiplying by 10. For legacy integrations, refer to the [Talos
    // Intelligence Usage Guidance](https://wiki.cisco.com/x/P3vGH) document
    // for how to use and display the reputation score.
    sint32 reputation_score_x10 = 2;

    // If true, ignore the the reputation_x10 field, as the threat level is
    // "unknown".
    bool no_reputation_score = 3;

    // IDs representing the threat categories for this response. The Threat
    // Category Map provides the mapping of the threat category ID to
    // mnemonic, name, and description. For how and when to pull the Threat
    // Category Map, see the `QueryThreatCatMap` service method in
    // `service-urs.proto`. For the structure of the Threat Category Map, see
    // the `ThreatCategoryMap` message in `talos.proto`. There is no limit set
    // on the number of threat category IDs returned.
    repeated uint32 threat_cat_id = 4;

    // IDs representing the AUP categories for this response. The AUP Category
    // Map provides the mapping of the AUP category ID to mnemonic, name, and
    // description. For how and when to pull the AUP Category Map, see the
    // `QueryAUPCatMap` service method in `service-urs.proto`. For the
    // structure of the AUP Category Map, see the `AUPCategoryMap` message in
    // `talos.proto`. The first ID in the list represents the primary AUP
    // category. The remaining IDs represent secondary categories, in no
    // particular order. The list is limited to 5 IDs per URL.
    repeated uint32 aup_cat_id = 5;

    // Deprecated: ignore.
    // Tag ID list. This is a method to apply a tag to the result that
    // customers can filter on, but it does not fit in with AUP categories or
    // threat categories. E.g., TOR exit nodes, NSD, and other things that
    // should not be AUP categories. Some of these may also be threat
    // categories, but the customer should be able to filter on them when the
    // score is non-blocking. See the `QueryTagMap` service method to retrieve
    // a mapping of tag ID to mnemonic, name, and description. There is no
    // limit on the number tag IDs returned per URL.
    repeated uint32 tag_id = 6;

    // Deprecated: do not use in future integrations.
    // The domain initialization timestamp. This is the creation date if Talos
    // has it. Otherwise, it represents the first time the backend systems saw
    // the domain.
    int64 domain_init = 7;

    // Encapsulating proxy and URL shortener handling results.
    AssociatedResults associated_result = 8;

    // The URL this result is for. This is an empty string for the source URL.
    // If the source URL is a supported shortened URL or encapsulating proxy,
    // then `result_type` will indicate the type of result this is (see the
    // `AssociatedResultType` enum).
    string url = 9;

    // For Talos Internal Use Only.
    // IDs representing the Talos reputation rule hits associated with this
    // URL address. The Reputation Rule Map provides the mapping of the
    // reputation rule ID to mnemonic (needed by Talos engines in some
    // instances, such as CASE on ESA). Reputation rule hits are for internal
    // Talos use only, and no descriptions are provided. Non-Talos consumers
    // are to ignore this field, other than to pass it on to Talos engines
    // upon request. For how and when to pull the Reputation Rule Map, see the
    // `QueryRuleMap` service method in `service-urs.proto`. For the structure
    // of the Reputation Rule Map, see the `ReputationRuleMap` message in
    // `talos.proto`.
    repeated uint32 rep_rule_id = 10;

    // Enumeration for URL processing errors.
    enum URLError {
        // No error.
        ERROR_NONE = 0;

        // Contacting the URL shortener service to resolve the target URL
        // failed. Clients should consider resubmitting the request for this
        // URL.
        ERROR_SHORTENER_FAIL = 1;

        // General cloud-side error while processing the URL. This should be
        // logged by the client and the client should consider resubmitting
        // the request for this URL.
        ERROR_INTERNAL = 2;

        // Invalid parameter passed in the request. This should be logged, but
        // a retry should not be performed with the same request data for this
        // URL.
        ERROR_INVALID_REQUEST = 3;
    }

    // Error from processing the URL, if any. A value of zero
    // (`URL_RESULT_ERROR_NONE`) means no error.
    URLError error = 11;

    // If an error occurred, indicates the error is temporary and suggests
    // that the operation can be retried.
    bool error_is_temporary = 12;
}

// Encapsulating proxy and URL shortener handling results. If more than 10
// levels deep, then a blocking score will be returned with no rule hits
// (`rep_rule_id` will be empty).
message AssociatedResults {

    // Enumeration for associated result types.
    enum AssociatedResultType {
        // No associated results.
        ASSOCIATED_RESULT_TYPE_NONE = 0;

        // Encapsulated proxy.
        ASSOCIATED_RESULT_TYPE_EP = 1;

        // Shortened URL.
        ASSOCIATED_RESULT_TYPE_SHORT_URL = 2;

        // URL previously rewritten by ESA.
        ASSOCIATED_RESULT_TYPE_RWR_URL = 3;

        // (Is ESA the correct term here? Will any other customer use this?)
    }

    // The type of associated result.
    AssociatedResultType result_type = 1;

    // Results for intermediate URLs encountered while unwrapping the URL in
    // the original query.
    repeated URLResult result = 2;
}

// The request to retrieve the current mapping of threat level ID to mnemonic,
// name, and description. See the `Talos.AUPCategoryMap` message for the
// response specification.
message AUPCatMapRequest {

}

// The request to retrieve the mapping of threat category ID to mnemonic,
// name, and description. See the `Talos.ThreatCategoryMap` message for the
// response specification.
message ThreatCatMapRequest {

}

// The request to retrieve the mapping of threat level ID to name and
// description. See the `Talos.ThreatLevelMap` message for the response
// specification.
message ThreatLevelMapRequest {

}

// The request to retrieve the current mapping of tag ID to mnemonic, name,
// and description. See the `Talos.TagMap` message for the response
// specification.
message TagMapRequest {

}
