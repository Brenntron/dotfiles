<!DOCTYPE html>
<html>
<head>
  <title>We're sorry, but something went wrong (500)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>

  html, body{
    margin: 0;
    padding: 0;
  }

  html{
    height: 100%;
  }

  body {
    background-color: #EFEFEF;
    color: #2E2F30;
    text-align: center;
    font-family: arial, sans-serif;
    min-height: 100%;
  }

  #nav-banner{
    background-color: #4E4E4E;
    height: 44px;
  }

  #side-nav{
    width: 44px;
    height: 100%;
    background-color: #2c3e50;
    position: absolute;
  }

  #top-corner-square{
    width: 100%;
    background-color: #fff;
    height: 44px;
  }

  #page-wrapper{
    margin-left: 44px;
  }

  #page-content-wrapper{
    display: block;
    padding: 20px;
  }

  .content-wrapper{
    background: #fff;
    border-radius: 4px;
    -webkit-box-shadow: 2px 0 10px 1px rgba(0, 0, 0, 0.1);
    -moz-box-shadow: 2px 0 10px 1px rgba(0, 0, 0, 0.1);
    box-shadow: 2px 0 10px 1px rgba(0, 0, 0, 0.1);
    padding: 15px;
  }

  #dialog-header {
    background-color: #fff;
    padding: 7px 12% 0;
  }

  h1 {
    font-size: 26px;
    line-height: 1.5em;
    font-family: 'Open Sans', sans-serif;
    font-weight: 100;
  }

  .dialog > p {
    margin: 0 0 1em;
    padding: 1em;
    border-top: 1px solid #f2f2f2;
    border-top-color: #DADADA;
    color: #666;
    width: fit-content;
    margin: auto;
  }
  </style>
</head>

<body>
  <!-- This file lives in public/500.html -->
  <div id="side-nav">
    <div id="top-corner-square"></div>
  </div>
  <div id="page-wrapper">
    <div id="nav-banner"></div>
    <div id="page-content-wrapper">
      <div class="content-wrapper">
        <div class="dialog">
          <div id="dialog-header">
            <h1>Looks like something broke. Sorry!</h1>
          </div>
          <p>Please report this to the Communities Development team asap.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
