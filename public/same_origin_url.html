<!DOCTYPE html>
<html lang=en>
<head>
  <meta content="text/html; charset=utf-8" http-equiv=Content-Type>
  <title>Centering example</title>

  <meta content="width=device-width" name=viewport>
  <style>
    body {
      background: #d7dadb
    }
    section {
      font-size: 2em;
      text-align: center;
      background: #8acee9;
      color: black;
      border-radius: 1em;
      padding: 1em;
      position: absolute;
      top: 50%;
      left: 50%;
      margin-right: -50%;
      transform: translate(-50%, -50%)
    }
    .arrow {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 100px 100px 100px;
      border-color: transparent transparent #8acee9 transparent;
    }
    .container {
      padding-right: 60px;
      margin: 0 auto;
      width: 100px;
    }

  </style>
</head>

<body>
<div class="container">
  <div class="arrow"></div>
</div>

<section>
  <h1>CANNOT DISPLAY</h1>
  <p> This Page cannot be viewed due to its Same Origin Policy please click the link above</p>
</section>
</body>
</html>
